<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Builder | Uplift Health</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .builder-layout { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; }
  .exercise-list { background: #f9f9f9; padding: 1rem; border-radius: 8px; height: 70vh; overflow-y: auto; }
  .exercise-item { background: #fff; padding: 0.8rem; border-radius: 4px; border: 1px solid #eee; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s; }
  .exercise-item:hover { border-color: var(--primary); background: #f0fff4; }
  .routine-area { background: #fff; padding: 2rem; border-radius: 8px; border: 1px solid #dfe6e9; min-height: 70vh; }
  .routine-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-bottom: 1px solid #eee; }
  .routine-item input { width: 60px; padding: 0.4rem; border: 1px solid #eee; border-radius: 4px; text-align: center; }
  .remove-btn { color: #e74c3c; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><span class="logo-icon">&#9877;</span> Uplift Health</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="calculators.html">Calculators</a></li>
    <li><a href="meal-planner.html">Meal Planner</a></li>
    <li><a href="workout-builder.html" class="active">Workouts</a></li>
    <li><a href="wellness-journal.html">Wellness</a></li>
    <li><a href="find-professional.html">Find a Pro</a></li>
    <li><a href="marketplace.html">Shop</a></li>
  </ul>
</nav>

<section class="section">
  <h1 class="section-title" style="text-align:left;">Workout Plan Builder</h1>
  <p class="section-sub" style="text-align:left; margin-left:0;">Drag and drop or click to add exercises to your routine. Track your sets and reps.</p>

  <div class="builder-layout">
    <div class="exercise-sidebar">
      <h3>Library</h3>
      <div class="exercise-list" id="library">
        <!-- JS populated -->
      </div>
    </div>
    <div class="routine-area">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h3>My Routine</h3>
        <button class="btn btn-primary btn-sm" onclick="saveRoutine()">Save Routine</button>
      </div>
      <div id="routineList">
        <p style="color:#999; text-align:center; margin-top:3rem;">No exercises added yet. Pick some from the library!</p>
      </div>
    </div>
  </div>
</section>

<script>
  const library = [
    { id: 1, name: 'Push Ups', cat: 'Chest' },
    { id: 2, name: 'Squats', cat: 'Legs' },
    { id: 3, name: 'Pull Ups', cat: 'Back' },
    { id: 4, name: 'Plank', cat: 'Core' },
    { id: 5, name: 'Lunges', cat: 'Legs' },
    { id: 6, name: 'Dips', cat: 'Triceps' },
    { id: 7, name: 'Burpees', cat: 'Full Body' },
    { id: 8, name: 'Deadlifts', cat: 'Back/Legs' },
    { id: 9, name: 'Bicep Curls', cat: 'Arms' },
    { id: 10, name: 'Shoulder Press', cat: 'Shoulders' }
  ];

  let myRoutine = JSON.parse(localStorage.getItem('myRoutine')) || [];

  function renderLibrary() {
    const libDiv = document.getElementById('library');
    libDiv.innerHTML = library.map(ex => `
      <div class="exercise-item" onclick="addToRoutine(${ex.id})">
        <strong>${ex.name}</strong><br>
        <small style="color:#888;">${ex.cat}</small>
      </div>
    `).join('');
  }

  function renderRoutine() {
    const listDiv = document.getElementById('routineList');
    if (myRoutine.length === 0) {
      listDiv.innerHTML = '<p style="color:#999; text-align:center; margin-top:3rem;">No exercises added yet. Pick some from the library!</p>';
      return;
    }
    listDiv.innerHTML = myRoutine.map((ex, idx) => `
      <div class="routine-item">
        <div style="flex:1"><strong>${ex.name}</strong></div>
        <div>Sets: <input type="number" value="${ex.sets || 3}" onchange="updateEx(${idx}, 'sets', this.value)"></div>
        <div>Reps: <input type="number" value="${ex.reps || 10}" onchange="updateEx(${idx}, 'reps', this.value)"></div>
        <div class="remove-btn" onclick="removeFromRoutine(${idx})">&times;</div>
      </div>
    `).join('');
  }

  function addToRoutine(id) {
    const ex = library.find(item => item.id === id);
    myRoutine.push({ ...ex, sets: 3, reps: 10 });
    renderRoutine();
  }

  function removeFromRoutine(idx) {
    myRoutine.splice(idx, 1);
    renderRoutine();
  }

  function updateEx(idx, field, val) {
    myRoutine[idx][field] = val;
  }

  function saveRoutine() {
    localStorage.setItem('myRoutine', JSON.stringify(myRoutine));
    alert('Routine saved!');
  }

  renderLibrary();
  renderRoutine();
</script>
</body>
</html>
