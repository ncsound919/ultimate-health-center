<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Planner | Uplift Health</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .meal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-top: 2rem; }
  .day-card { background: #fff; border: 1px solid #dfe6e9; border-radius: 8px; padding: 1.5rem; }
  .day-card h4 { margin-bottom: 1rem; color: var(--primary); border-bottom: 2px solid #f1f1f1; padding-bottom: 0.5rem; }
  .meal-slot { margin-bottom: 1rem; }
  .meal-slot label { font-size: 0.75rem; text-transform: uppercase; color: #999; display: block; }
  .meal-input { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 0.4rem 0; outline: none; transition: border-color 0.3s; }
  .meal-input:focus { border-color: var(--primary); }
  .planner-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><span class="logo-icon">&#9877;</span> Uplift Health</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="calculators.html">Calculators</a></li>
    <li><a href="meal-planner.html" class="active">Meal Planner</a></li>
    <li><a href="workout-builder.html">Workouts</a></li>
    <li><a href="wellness-journal.html">Wellness</a></li>
    <li><a href="find-professional.html">Find a Pro</a></li>
    <li><a href="marketplace.html">Shop</a></li>
  </ul>
</nav>

<section class="section">
  <div class="planner-header">
    <div>
      <h1 class="section-title" style="text-align:left; margin:0;">Weekly Meal Planner</h1>
      <p style="color:#666;">Plan your nutrition for the week. Saved automatically to your browser.</p>
    </div>
    <div class="actions">
      <button class="btn btn-outline" onclick="clearAll()">Clear All</button>
      <button class="btn btn-primary" onclick="exportPlan()">Export PDF</button>
    </div>
  </div>

  <div class="meal-grid" id="mealGrid">
    <!-- Generated by JS -->
  </div>
</section>

<script>
  const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
  const slots = ['Breakfast', 'Lunch', 'Dinner', 'Snacks'];
  
  function initPlanner() {
    const grid = document.getElementById('mealGrid');
    const savedData = JSON.parse(localStorage.getItem('mealPlan')) || {};

    days.forEach(day => {
      const card = document.createElement('div');
      card.className = 'day-card';
      card.innerHTML = `<h4>${day}</h4>`;
      
      slots.forEach(slot => {
        const val = (savedData[day] && savedData[day][slot]) ? savedData[day][slot] : '';
        const slotDiv = document.createElement('div');
        slotDiv.className = 'meal-slot';
        slotDiv.innerHTML = `
          <label>${slot}</label>
          <input type="text" class="meal-input" placeholder="What's on the menu?" 
                 data-day="${day}" data-slot="${slot}" value="${val}"
                 onchange="saveMeal(this)">
        `;
        card.appendChild(slotDiv);
      });
      grid.appendChild(card);
    });
  }

  function saveMeal(el) {
    const day = el.dataset.day;
    const slot = el.dataset.slot;
    const val = el.value;
    
    let savedData = JSON.parse(localStorage.getItem('mealPlan')) || {};
    if (!savedData[day]) savedData[day] = {};
    savedData[day][slot] = val;
    
    localStorage.setItem('mealPlan', JSON.stringify(savedData));
  }

  function clearAll() {
    if(confirm('Clear the entire weekly plan?')) {
      localStorage.removeItem('mealPlan');
      location.reload();
    }
  }

  function exportPlan() {
    alert('Plan exported to text! In a real app, this would generate a formatted PDF.');
    console.log(localStorage.getItem('mealPlan'));
  }

  initPlanner();
</script>
</body>
</html>
